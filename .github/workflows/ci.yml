name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  prek:
    name: Pre-commit checks (prek)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
          components: rustfmt, clippy

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install web dependencies
        working-directory: web
        run: npm install

      - name: Install prek
        run: pipx install prek

      - name: Run prek pre-commit
        run: prek run --all-files

  build-web:
    name: Build web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: web
        run: npm install

      - name: Build
        working-directory: web
        run: npm run build

  build-x86_64:
    name: Build x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        if: github.event_name == 'push' || github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: fuel-logger-rs-x86_64
          path: target/release/fuel-logger-rs

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mv target/release/fuel-logger-rs fuel-logger-rs-x86_64
          gh release upload "${{ github.event.release.tag_name }}" \
            fuel-logger-rs-x86_64

  build-aarch64:
    name: Build aarch64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91"
          targets: aarch64-unknown-linux-musl

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target aarch64-unknown-linux-musl

      - name: Upload artifact
        if: github.event_name == 'push' || github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: fuel-logger-rs-aarch64
          path: target/aarch64-unknown-linux-musl/release/fuel-logger-rs

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mv target/aarch64-unknown-linux-musl/release/fuel-logger-rs fuel-logger-rs-aarch64
          gh release upload "${{ github.event.release.tag_name }}" \
            fuel-logger-rs-aarch64
